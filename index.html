<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Calculadora de Média</title>
</head>
<body>
    <div class="container">
        <input type="number" id="nota1" placeholder="insira a primeira nota">
        <input type="number" id="nota2" placeholder="insira a segunda nota">
        <input type="number" id="nota3" placeholder="insira a terceira nota">
        <input type="number" id="nota4" placeholder="insira a quarta nota">        
        <input type="number" id="nota5" placeholder="insira a quinta nota">        
        <input type="number" id="nota6" placeholder="insira a sexta nota">
        <input type="button" value="Calcular Média" id="button">
        <div id="resultado"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
